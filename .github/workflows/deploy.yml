name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deployment
        run: |
          curl -X POST "https://api.vercel.com/v1/integrations/github/deploy" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "client",
              "ref": "main"
            }'
        continue-on-error: true

      - name: Trigger Render deployment
        run: curl --fail --request POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        continue-on-error: true
